# .github/workflows/ci.yml
# Runs on every PR and every push to main. Gates merging.
# Does NOT release — that's release.yml.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quick-check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Typecheck + Lint (npm run check)
        run: npm run check

  # NOTE: No `build` job in CI.
  # Vercel handles production and preview builds directly. Running `next build`
  # in CI would duplicate Vercel's work and require embedding real Supabase
  # credentials (several pages prerender with live data). The Vercel preview
  # deploy that fires on every PR is the authoritative build signal.

  marketing-consistency:
    name: Marketing consistency (ADDENDUM_00J)
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Check marketing consistency
        run: node scripts/check-marketing-consistency.mjs

  security-scan:
    name: Security (static Supabase checks)
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run security:db (static Supabase-only subset)
        run: npm run security:db
        env:
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        # Secrets are optional; security:db short-circuits gracefully if absent.
        # The full localhost audit (security:prod) remains a pre-deploy local step.
        continue-on-error: false

  dependency-scan:
    name: Dependency CVE scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy (strict on main, advisory on PR)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
          ignore-unfixed: true

  fitscore-parity:
    name: FitScore primitive parity (§11.20)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check FitScore primitive parity
        run: node scripts/check-fitscore-parity.mjs
        env:
          PARITY_BASE_SHA: ${{ github.event.pull_request.base.sha }}

  pr-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            chore
            docs
            test
            build
            ci
            style
            revert
          requireScope: false
          # No subjectPattern — Dependabot uses "Bump X from Y to Z" (capital B, not configurable)
          validateSingleCommit: false
