# .github/workflows/dependabot-auto-merge.yml — FILL: one-line purpose
#
# FILL: fill in relevant fields and delete unused ones:
# Trigger: on push / pull_request / schedule / etc.
# Auth:    secrets or permissions required
# Notes:   gotchas or non-obvious decisions
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: dependabot/fetch-metadata@v3
        id: meta

      # Auto-merge minor and patch bumps only.
      # Major bumps are ignored by dependabot.yml so this guard is belt-and-braces.
      - if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
