# .github/workflows/dependabot-auto-merge.yml
# Auto-merges Dependabot minor/patch dependency PRs via squash.
# Trigger: pull_request_target
# Auth:    GITHUB_TOKEN (contents: write, pull-requests: write)
# Notes:   Gated to the dependabot[bot] actor; major bumps skipped (this guard + dependabot.yml config)
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: dependabot/fetch-metadata@v3
        id: meta

      # Auto-merge minor and patch bumps only.
      # Major bumps are ignored by dependabot.yml so this guard is belt-and-braces.
      - if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
