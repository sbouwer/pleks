<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none" width="400" height="320">
  <!-- Card outline -->
  <rect x="20" y="40" width="280" height="240" rx="12" stroke="#E8A838" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Header lines -->
  <line x1="40"  y1="65" x2="100" y2="65" stroke="#E8A838" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="180" y1="65" x2="220" y2="65" stroke="#E8A838" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="240" y1="65" x2="270" y2="65" stroke="#E8A838" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="40"  y1="75" x2="280" y2="75" stroke="#E8A838" stroke-opacity="0.06" stroke-width="0.5"/>
  <!-- Row 1 — credit record -->
  <circle cx="50" cy="100" r="10" stroke="#E8A838" stroke-opacity="0.6" stroke-width="1"/>
  <line x1="68" y1="97"  x2="130" y2="97"  stroke="#E8A838" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="68" y1="105" x2="110" y2="105" stroke="#E8A838" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="180" y="93"  width="90" height="6" rx="3" stroke="#E8A838" stroke-opacity="0.2" stroke-width="0.5"/>
  <rect x="180" y="93"  width="77" height="6" rx="3" fill="#E8A838" fill-opacity="0.45"/>
  <!-- Row 2 — income -->
  <circle cx="50" cy="145" r="10" stroke="#E8A838" stroke-opacity="0.65" stroke-width="1"/>
  <line x1="68" y1="142" x2="140" y2="142" stroke="#E8A838" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="68" y1="150" x2="105" y2="150" stroke="#E8A838" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="180" y="138" width="90" height="6" rx="3" stroke="#E8A838" stroke-opacity="0.2" stroke-width="0.5"/>
  <rect x="180" y="138" width="56" height="6" rx="3" fill="#E8A838" fill-opacity="0.55"/>
  <!-- Row 3 — tenancy -->
  <circle cx="50" cy="190" r="10" stroke="#E8A838" stroke-opacity="0.8" stroke-width="1"/>
  <line x1="68" y1="187" x2="125" y2="187" stroke="#E8A838" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="68" y1="195" x2="115" y2="195" stroke="#E8A838" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="180" y="183" width="90" height="6" rx="3" stroke="#E8A838" stroke-opacity="0.2" stroke-width="0.5"/>
  <rect x="180" y="183" width="82" height="6" rx="3" fill="#E8A838" fill-opacity="0.65"/>
  <!-- Row 4 — ID -->
  <circle cx="50" cy="235" r="10" stroke="#E8A838" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="68" y1="232" x2="135" y2="232" stroke="#E8A838" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="180" y="228" width="90" height="6" rx="3" stroke="#E8A838" stroke-opacity="0.2" stroke-width="0.5"/>
  <rect x="180" y="228" width="40" height="6" rx="3" fill="#E8A838" fill-opacity="0.4"/>
  <!-- Dial -->
  <circle cx="330" cy="90" r="55" stroke="#E8A838" stroke-opacity="0.06" stroke-width="4"/>
  <circle cx="330" cy="90" r="55" stroke="#E8A838" stroke-opacity="0.65" stroke-width="4"
    stroke-dasharray="280 66" stroke-linecap="round" transform="rotate(-90 330 90)"/>
  <line x1="315" y1="85" x2="345" y2="85" stroke="#E8A838" stroke-opacity="0.5" stroke-width="2.5"/>
  <line x1="322" y1="95" x2="338" y2="95" stroke="#E8A838" stroke-opacity="0.3" stroke-width="1.5"/>
  <rect x="305" y="160" width="50" height="20" rx="6" stroke="#E8A838" stroke-opacity="0.3" stroke-width="0.8"/>
  <line x1="315" y1="170" x2="345" y2="170" stroke="#E8A838" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
