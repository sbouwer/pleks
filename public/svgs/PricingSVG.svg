<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none" width="400" height="320">
  <!-- Grid lines -->
  <line x1="30" y1="205" x2="340" y2="205" stroke="#E8A838" stroke-width="0.5"/>
  <line x1="30" y1="150" x2="340" y2="150" stroke="#E8A838" stroke-width="0.5"/>
  <line x1="30" y1="95"  x2="340" y2="95"  stroke="#E8A838" stroke-width="0.5"/>
  <line x1="30" y1="40"  x2="340" y2="40"  stroke="#E8A838" stroke-width="0.5"/>
  <line x1="30" y1="260" x2="340" y2="260" stroke="#E8A838" stroke-width="1"/>
  <!-- Bars -->
  <rect x="50"  y="30"  width="30" height="230" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.25"/>
  <rect x="100" y="60"  width="30" height="200" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.25"/>
  <rect x="150" y="15"  width="30" height="245" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="200" y="50"  width="30" height="210" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="250" y="40"  width="30" height="220" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.8"/>
  <rect x="300" y="55"  width="30" height="205" rx="3" stroke="#E8A838" stroke-width="1.2" stroke-opacity="0.8"/>
  <!-- Trend line -->
  <polyline points="65,30 115,60 165,15 215,50 265,40 315,55"
    stroke="#E8A838" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-opacity="0.5"/>
  <!-- Dots -->
  <circle cx="65"  cy="30" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <circle cx="115" cy="60" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <circle cx="165" cy="15" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <circle cx="215" cy="50" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <circle cx="265" cy="40" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <circle cx="315" cy="55" r="3" fill="#E8A838" fill-opacity="0.6"/>
  <!-- Inset card -->
  <rect x="220" y="170" width="160" height="120" rx="8" stroke="#E8A838" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="235" y1="195" x2="310" y2="195" stroke="#E8A838" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="330" y1="195" x2="365" y2="195" stroke="#E8A838" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="235" y1="215" x2="300" y2="215" stroke="#E8A838" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="235" y1="235" x2="295" y2="235" stroke="#E8A838" stroke-width="1.5" stroke-opacity="0.2"/>
  <line x1="235" y1="260" x2="280" y2="260" stroke="#E8A838" stroke-width="2"   stroke-opacity="0.5"/>
  <line x1="325" y1="260" x2="365" y2="260" stroke="#E8A838" stroke-width="2"   stroke-opacity="0.7"/>
</svg>
