<!--
  Supabase Auth → Email Templates → "Reauthentication"
  Subject: Your Pleks verification code
  NOTE: this template uses a one-time CODE ({{ .Token }}), not a link/button.
  Variables: {{ .Token }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <style>
    /* Dark-mode logo swap — the dark-ink wordmark vanishes on a dark card, so show the light-ink one there.
       Covers clients that honour prefers-color-scheme (Apple Mail, iOS, Gmail app) + Outlook.com/new Outlook
       ([data-ogsc]). Old Outlook desktop (Word engine) ignores both → falls back to the light-ink default. */
    @media (prefers-color-scheme: dark) {
      .pl-logo-light { display: none !important; }
      .pl-logo-dark  { display: inline-block !important; }
    }
    [data-ogsc] .pl-logo-light { display: none !important; }
    [data-ogsc] .pl-logo-dark  { display: inline-block !important; }
  </style>
</head>
<body style="margin:0; padding:24px 0; background:#f4f4f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border-radius:8px; border-top:4px solid #E8A838; overflow:hidden;">
        <tr><td style="padding:24px 32px 8px 32px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr>
            <td style="vertical-align:middle;">
              <img class="pl-logo-light" src="https://app.pleks.co.za/logo/pleks-wordmark-light.png" alt="Pleks" height="44" style="display:block; height:44px; width:auto; border:0;">
              <img class="pl-logo-dark" src="https://app.pleks.co.za/logo/pleks-wordmark-dark.png" alt="Pleks" height="44" style="display:none; height:44px; width:auto; border:0;">
            </td>
            <td align="right" style="vertical-align:middle; font-size:12px; color:#a1a1aa;">Property management</td>
          </tr></table>
        </td></tr>
        <tr><td style="padding:16px 32px 8px 32px;">
          <h1 style="margin:0 0 12px 0; font-size:18px; font-weight:700; color:#18181b;">Your verification code</h1>
          <p style="margin:0 0 20px 0; font-size:15px; line-height:22px; color:#3f3f46;">
            Enter this code to confirm it&rsquo;s you:
          </p>
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px 0;"><tr>
            <td style="border:1px solid #e4e4e7; border-radius:6px; background:#faf9f5; padding:16px 28px; font-size:30px; font-weight:700; letter-spacing:6px; color:#18181b; font-family:'SF Mono',Menlo,Consolas,monospace;">
              {{ .Token }}
            </td>
          </tr></table>
        </td></tr>
        <tr><td style="padding:16px 32px 24px 32px;">
          <hr style="border:none; border-top:1px solid #e4e4e7; margin:8px 0 16px 0;">
          <p style="margin:0 0 6px 0; font-size:12px; line-height:18px; color:#71717a;">
            This code expires in 1 hour. If you didn&rsquo;t request it, ignore this email &mdash; and consider changing your password.
          </p>
          <p style="margin:0; font-size:11px; color:#a1a1aa;">
            Sent by Pleks &middot; <a href="https://pleks.co.za" style="color:#a1a1aa;">pleks.co.za</a> &middot; Questions? <a href="mailto:security@pleks.co.za" style="color:#71717a;">security@pleks.co.za</a>
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
